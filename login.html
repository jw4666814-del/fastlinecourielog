<!DOCTYPE html>
<html>
<head>
  <title>Fastline Admin Login</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      text-align: center; 
      margin-top: 100px; 
      background: #f3f4f6; 
    }
    .login-box { 
      background: white; 
      padding: 40px; 
      border-radius: 12px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
      display: inline-block; 
      max-width: 300px;
    }
    h2 { color: #1e40af; margin-bottom: 20px; }
    input { 
      padding: 12px; 
      margin: 8px; 
      width: 250px; 
      border: 1px solid #ddd; 
      border-radius: 6px; 
      font-size: 14px;
    }
    button { 
      padding: 12px 24px; 
      background: #1e40af; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      margin-top: 15px;
      font-size: 16px;
      font-weight: 600;
    }
    button:hover { background: #1e3a8a; }
    .error { color: #dc2626; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>🔐 Fastline Admin Login</h2>
    <input type="email" id="email" placeholder="Admin Email"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p id="errorMsg" class="error"></p>
  </div>

  <script>
    // Your Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyC89RwQp0vXTSvyzCtChIZnjsPNZjLtNfk",
      authDomain: "fastline-logistics.firebaseapp.com",
      projectId: "fastline-logistics",
    };
    
    firebase.initializeApp(firebaseConfig);

    function login(){
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");
      
      if (!email || !password) {
        errorMsg.textContent = "Please enter both email and password";
        return;
      }

      firebase.auth().signInWithEmailAndPassword(email, password)
        .then(() => {
          window.location.href = "dashboard.html";
        })
        .catch(error => {
          errorMsg.textContent = error.message;
        });
    }

    // Allow Enter key to login
    document.getElementById("password").addEventListener('keypress', function(e) {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
